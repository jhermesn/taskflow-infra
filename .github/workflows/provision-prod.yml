name: Provision Infrastructure - PROD

on:
  workflow_dispatch:

permissions: {}

jobs:
  provision:
    name: Provision - prod
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df  # v4.2.1
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3.1.2
        with:
          terraform_version: "~> 1.10"
          terraform_wrapper: false

      - name: Apply - networking
        working-directory: prod/us-east-1/networking
        run: terraform init && terraform apply -auto-approve

      - name: Apply - backend
        working-directory: prod/us-east-1/backend
        run: terraform init && terraform apply -auto-approve -var="enabled=true"

      - name: Summary
        env:
          REGION: ${{ vars.AWS_REGION }}
        run: |
          ALB=$(terraform -chdir="prod/us-east-1/backend" output -raw alb_dns_name)
          ECR=$(terraform -chdir="prod/us-east-1/backend" output -raw ecr_repository_url)
          CLUSTER=$(terraform -chdir="prod/us-east-1/backend" output -raw ecs_cluster_name)
          SERVICE=$(terraform -chdir="prod/us-east-1/backend" output -raw ecs_service_name)
          {
            echo "### Provisioned - prod"
            echo "| | Value |"
            echo "|---|---|"
            echo "| ALB | http://${ALB} |"
            echo "| ECR | ${ECR} |"
            echo ""
            echo "Set these in the **prod** environment of **taskflow-app**:"
            echo "- \`ECR_REPOSITORY_URL\` - \`${ECR}\`"
            echo "- \`ECS_CLUSTER_NAME\` - \`${CLUSTER}\`"
            echo "- \`ECS_SERVICE_NAME\` - \`${SERVICE}\`"
            echo "- \`AWS_REGION\` - \`${REGION}\`"
          } >> "$GITHUB_STEP_SUMMARY"
