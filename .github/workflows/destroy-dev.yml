name: Destroy Infrastructure - DEV

on:
  workflow_dispatch:

permissions: {}

jobs:
  destroy:
    name: Destroy - dev
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: aws-actions/configure-aws-credentials@b47578312673ae6fa5b5096b330d9fbac3d116df  # v4.2.1
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd  # v3.1.2
        with:
          terraform_version: "~> 1.10"
          terraform_wrapper: false

      - name: Destroy - backend
        working-directory: dev/us-east-1/backend
        run: terraform init && terraform destroy -auto-approve -var="enabled=false"

      - name: Destroy - networking
        working-directory: dev/us-east-1/networking
        run: terraform init && terraform destroy -auto-approve

      - name: Summary
        run: echo "### Destroyed - dev" >> "$GITHUB_STEP_SUMMARY"
